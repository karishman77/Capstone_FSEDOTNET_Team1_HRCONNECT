version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: hrconnect_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hrconnect_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hrconnect_network

volumes:
  postgres_data:

networks:
  hrconnect_network:
    driver: bridge
